# 默认配置入口。训练、评估和 smoke test 仍然只需要传这个文件。
# includes 按顺序加载，后面的文件会覆盖前面的同名字段；本文件自身的字段优先级最高。
includes:
  - robot/ur5_like.yaml
  - environment/sim.yaml
  - algo/sac.yaml
  - run/dev.yaml

# 全局随机种子。训练、评估和环境采样都会使用它，正式对比时应固定同一组 seed。
seed: 42

# 计算设备。
# cpu: 强制使用 CPU。
# cuda:0/cuda:1: 强制使用指定 GPU。
# cuda 或 cuda:auto: 自动综合空闲显存和显卡算力选择 GPU。
device: cuda

# GPU 自动选择参数。仅当 device 为 cuda、cuda:auto 或 auto 时生效。
device_selection:
  # true 时，如果 CUDA 不可用或没有满足显存阈值的卡，则回退 CPU；false 时直接报错。
  fallback_to_cpu: true
  # 候选 GPU id。null 表示扫描全部可见 GPU。
  candidate_ids: null
  # 最小空闲显存要求，单位 GB。低于该阈值的卡不会被选中。
  min_free_memory_gb: 2.0
  # 空闲显存占比的权重，越大越偏向选当前更空闲的卡。
  memory_weight: 0.7
  # 算力评分权重，越大越偏向选 SM 数和 compute capability 更高的卡。
  compute_weight: 0.3
  # 是否在启动时打印每张候选卡的评分和最终选择。
  print_summary: true
