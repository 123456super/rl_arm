seed: 42
device: cpu

env:
  gui: false
  time_step: 0.0041666667
  control_dt: 0.05
  max_episode_steps: 240
  action_scale: 0.7
  fixed_beta: 0.35
  success_tolerance: 0.055
  workspace:
    x: [0.25, 0.78]
    y: [-0.45, 0.45]
    z: [0.18, 0.78]
  obstacle:
    radius: 0.07
    speed_range: [0.12, 0.38]
  goal:
    fixed: false
    position: [0.55, 0.18, 0.36]

risk:
  d_safe: 0.12
  sigma_d: 0.12
  v_max: 0.7
  ttc_max: 3.0
  tau: 1.0
  eps: 1.0e-8
  eps_v: 1.0e-4
  weights:
    distance: 0.5
    velocity: 0.2
    ttc: 0.3
  cost:
    k_risk: 1.0
    k_violation: 3.0
    k_collision: 8.0
    c_safe: 0.55

smoothing:
  beta_min: 0.12
  beta_max: 0.85
  risk_high: 0.75
  lambda_beta: 0.4

reward:
  w_position: 2.0
  w_progress: 18.0
  w_smooth: 0.04
  success_bonus: 20.0
  collision_penalty: 2.0

sac:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  lambda_lr: 0.01
  cost_ema_rho: 0.05
  batch_size: 256
  replay_size: 300000
  warmup_steps: 3000
  update_after: 1000
  update_every: 1
  hidden_dims: [256, 256]
  fixed_risk_penalty: 4.0
  initial_alpha: 0.2
  initial_lambda: 0.1

train:
  total_steps: 100000
  log_interval: 10
  save_interval: 10000
  output_dir: outputs
